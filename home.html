<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
        <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
        <!-- tailwind & daisyui -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        
        <!-- Geist font -->
        
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

        <!-- font awesome  -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        
        <style>
            * {
                font-family: "Geist", sans-serif;
            }
        </style>
</head>
<body class="bg-gray-100">
    <header class="w-11/12 mx-auto py-6 sticky top-0 z-50 bg-base-100">
        <div class="navbar bg-base-100 px-6 shadow-sm flex justify-between">
            <div class="flex items-center gap-3">
                <img class="w-10 rounded-full" alt="" src="./assets/github-logo.png" />
                <p class="text-xl">GitHub Issues Tracker</p>
            </div>
            <div class="flex gap-3">
                <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered" />
                <button id="searchBtn" class="btn btn-primary"><i class="fa-solid fa-plus"></i>New Issue
                </button>
            </div>
        </div>

        <div class="bg-base-100 px-6 pt-6">
            <div class="flex gap-4">
                <button id="allIssuesBtn" class="btn btn-primary rounded-xl">All</button>
                <button id="openIssuesBtn" class="btn btn-outline rounded-xl">Open</button>
                <button id="closedIssuesBtn" class="btn btn-outline rounded-xl">Closed</button>
            </div>
        </div>
    </header>

    <main class="w-[80%] mx-auto mt-6">
        <div class="flex justify-between items-center mb-4">
            <div class="flex gap-3 items-center">
                <div class="w-8">
                    <img src="./assets/Aperture.png">
                </div>
                <div>
                    <h2 id="issueCount" class="font-bold">0 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm">
                <span class="flex gap-1 items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                    Open
                </span>
                <span class="flex gap-1 items-center">
                    <span class="w-2 h-2 bg-purple-500 rounded-full"></span>
                    Closed
                </span>
            </div>
        </div>

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        </div>
        <div id="loadingSpinner" class="hidden flex justify-center mt-10">
            <span class="loading loading-dots loading-lg"></span>
        </div>
    </main>
    <!-- Open the modal using ID.showModal() method -->
    
    <dialog id="issueModalDetails" class="modal">
        <div class="modal-box">
                <div class="flex justify-between items-start mb-4">
                  <h3 id="modalTitle" class="font-bold text-2xl">Issue Title</h3>
                  <button class="btn btn-sm btn-circle btn-ghost" onclick="document.getElementById('issueModalDetails').close()">✕</button>
                </div>
                <div id="modalLabels" class="flex flex-wrap gap-2 mb-4"></div>
                <p id="modalDescription" class="text-gray-600 mb-6"></p>

                <div class="bg-gray-100 rounded-lg p-4 flex justify-between items-center">
                
                    <div>
                        <p class="text-sm text-gray-500">Assignee:</p>
                        <p id="modalAssignee" class="font-semibold"></p>
                    </div>
                
                    <div>
                        <p class="text-sm text-gray-500">Priority:</p>
                        <span id="modalPriority" class="badge"></span>
                    </div>
                
                </div>
                
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="./script/script.js"></script>
</body>
</html>
